<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Ctrl-H</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .card{width:420px;background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px}
    h1{margin:0 0 12px 0;font-size:18px}
    label{display:block;margin:10px 0 6px;color:#94a3b8;font-size:13px}
    input{width:100%;padding:10px;border-radius:10px;border:1px solid #1f2937;background:#0b1220;color:#e2e8f0}
    button{margin-top:14px;width:100%;padding:10px;border-radius:10px;border:0;background:#2563eb;color:white;font-weight:700;cursor:pointer}
    .msg{margin-top:10px;color:#fca5a5;font-size:13px}
    .muted{margin-top:10px;color:#94a3b8;font-size:12px}
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>🔐 Ctrl-H | Acesso</h1>

    <label>Usuário</label>
    <input name="username" required autocomplete="username">

    <label>Senha</label>
    <input name="password" type="password" required autocomplete="current-password">

    <button type="submit">Entrar</button>

    {% if error %}
      <div class="msg">{{ error }}</div>
    {% endif %}

    <div class="muted">Padrão: admin / admin123 (se ADMIN_USER/ADMIN_PASS não foram alterados)</div>
  </form>
</body>
</html>
