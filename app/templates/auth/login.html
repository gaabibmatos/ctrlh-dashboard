<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ctrl-H | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<div class="container py-5" style="max-width: 460px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="mb-1">Ctrl-H</h4>
      <p class="text-muted mb-4">Entre para acessar o dashboard.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.login_post') }}">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input class="form-control" name="username" autocomplete="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input class="form-control" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-dark w-100">Entrar</button>
      </form>
    </div>
  </div>
  <p class="text-center text-muted mt-3 small">Local: SQLite | Render: Postgres via DATABASE_URL</p>
</div>
</body>
</html>
