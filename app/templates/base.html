<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ctrl-H | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">Ctrl-H</a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('settings.index') }}">Configurações</a>
      <a class="btn btn-outline-light btn-sm" href="{{ url_for('auth.logout') }}">Sair</a>
    </div>
  </div>
</nav>

<div class="container py-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mb-3">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 mb-2">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="row g-3">
    <div class="col-12 col-lg-2">
      <div class="list-group shadow-sm">
        <a class="list-group-item list-group-item-action" href="{{ url_for('dashboard.index') }}">Dashboard</a>
        <a class="list-group-item list-group-item-action" href="{{ url_for('finance.index') }}">Financeiro</a>
        <a class="list-group-item list-group-item-action" href="{{ url_for('supply.index') }}">Estoque & Ativos</a>
        <a class="list-group-item list-group-item-action" href="{{ url_for('ops.index') }}">Operação (Tarefas)</a>
        <a class="list-group-item list-group-item-action" href="{{ url_for('settings.index') }}">Owners & Categorias</a>
      </div>
    </div>
    <div class="col-12 col-lg-10">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
